{% extends "base.html" %}
{% block content %}
<section class="auth-layout single">
    <form class="card auth-card wide" method="post">
        <span class="badge">Student Registration</span>
        <h2>Create Student Account</h2>
        {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
        {% if success %}<div class="alert success">{{ success }}</div>{% endif %}
        <div class="grid two">
            <div><label>Student Name</label><input name="name" required></div>
            <div><label>Roll Number</label><input name="roll_no" maxlength="10" required></div>
            <div><label>Branch</label><input name="branch" required></div>
            <div><label>Phone Number</label><input name="phone" maxlength="10" required></div>
            <div><label>Email ID</label><input name="email" type="email" required></div>
            <div><label>Password</label><input name="password" type="password" required></div>
            <div><label>Confirm Password</label><input name="confirm_password" type="password" required></div>
        </div>
        <button type="submit">Create Account</button>
        <div class="links"><a href="{{ url_for('login') }}">Back to login</a></div>
    </form>
</section>
{% endblock %}
